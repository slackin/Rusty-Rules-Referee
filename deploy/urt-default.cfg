// =============================================================================
//  Rusty Rules Referee — UrT 4.3 default server.cfg template
// =============================================================================
//  This template is embedded into the R3 client bot and materialized by the
//  install wizard. Placeholders of the form {{NAME}} are substituted at
//  generation time; everything else is R3's curated default baseline.
//
//  The goal is to ship a server that works out-of-the-box with R3, follows
//  competitive-scene conventions, and does NOT rely on the UrT engine's
//  built-in defaults (which are usually wildly inappropriate).
//
//  Operators can tweak any of these values later via the R3 web config
//  editor. Anything not listed here will simply use the engine default.
// =============================================================================

// ---- Server Identity ---------------------------------------------------------
set sv_hostname              "{{SV_HOSTNAME}}"
set sv_joinmessage           "^2Welcome to {{SERVER_NAME}} — managed by R3"
set _Admin                   "R3"
set _Email                   ""
set _Location                ""
set _URL                     ""
set g_motd                   "Respect the rules. Admins are online."

// ---- Network ----------------------------------------------------------------
set net_port                 {{PORT}}
{{NET_IP_LINE}}
set sv_maxclients            {{MAX_CLIENTS}}
set sv_privateclients        0
set sv_privatePassword       ""
set sv_maxRate               25000
set sv_minRate               0
set sv_maxPing               0
set sv_minPing               0
set sv_allowDownload         1
set sv_dlURL                 ""
set sv_strictAuth            1
set sv_floodprotect          1
set sv_reconnectlimit        3

// ---- Passwords --------------------------------------------------------------
set rconPassword             "{{RCON_PASSWORD}}"
set sv_rconPassword          "{{RCON_PASSWORD}}"
set g_password               ""
{{ADMIN_PASSWORD_LINE}}

// ---- Game (gameplay basics) -------------------------------------------------
set g_gametype               {{G_GAMETYPE}}
set g_gear                   0
set g_gravity                800
set g_knockback              1000
set g_friendlyfire           2
set g_followstrict           1
set g_respawndelay           3
set g_warmup                 15
set g_matchmode              0
set g_autobalance            0
set g_roundtime              3
set timelimit                20
set fraglimit                0
set capturelimit             8
set g_cahtime                60
set g_bombexplodetime        40
set g_bombdefusetime         10
set g_swaproles              1

// ---- Voting (locked down sane defaults) -------------------------------------
// g_allowvote bitmask = map + nextmap + kick + mute + shuffle + reload
set g_allowvote              536871039
set g_votePercent            60
set g_voteDelay              30

// ---- Logging (REQUIRED for R3) ---------------------------------------------
// logfile 2 = append + flush, g_logsync 1 = flush every line, g_logroll 0 =
// never rotate (R3 handles rotation detection itself).
set g_log                    "games.log"
set g_logsync                1
set g_loghits                1
set g_logroll                0
set logfile                  2

// ---- Anti-cheat / Integrity -------------------------------------------------
set sv_pure                  1
set sv_punkbuster            0
set g_antilag                1
set g_antilagvis             0
set g_teamkillslimit         0
set g_spectatorvoice         0

// ---- Public listing ---------------------------------------------------------
set dedicated                2
set sv_master1               "master.urbanterror.info"
set sv_master2               "master.quake3arena.com"
set sv_heartbeat             "1"

// ---- Referee / HUD ----------------------------------------------------------
set g_armbands               0
set g_suddenDeath            1
set g_walkablespec           1

// ---- Map rotation (stub; customizable from R3 UI later) ---------------------
exec mapcycle.txt

// ---- First map --------------------------------------------------------------
map ut4_turnpike
