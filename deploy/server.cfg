// Urban Terror 4.3 Server Configuration
// CTF Mode on port 25000

// Server Identity
set sv_hostname "Rusty CTF Server"
set sv_joinmessage "Welcome to Rusty CTF Server"
set sv_maxclients 20
set sv_privateclients 0
set g_motd "Welcome to the server"

// Network
set net_port 25000
set sv_maxRate 25000
set sv_minRate 0
set sv_maxPing 0
set sv_minPing 0
set sv_allowDownload 1
set sv_strictAuth 1

// RCON
set rconPassword "rustybot"
set sv_rconPassword "rustybot"

// Game Settings
set g_gametype 7
set timelimit 20
set capturelimit 8
set g_friendlyfire 1
set g_followstrict 1
set g_warmup 15
set g_matchmode 0
set g_cahtime 60

// Logging (required for R3)
set g_log "games.log"
set g_logsync 1
set logfile 2
set g_logroll 0

// Anti-cheat
set sv_pure 1

// Map Rotation
set d1 "map ut4_turnpike"
set d2 "map ut4_abbey"
set d3 "map ut4_algiers"
set d4 "map ut4_austria"
set d5 "map ut4_prague"
set d6 "map ut4_mandolin"
set d7 "map ut4_kingdom"
set d8 "map ut4_sanita"
set d9 "map ut4_riyadh"
set d10 "map ut4_swim"

// Voting
set g_allowvote 536871039

// Gravity and Physics
set g_gravity 800
set g_knockback 1000

// Gear
set g_gear 0

// Start on first map
vstr d1
