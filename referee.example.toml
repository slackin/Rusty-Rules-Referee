# Rusty Rules Referee
# Urban Terror 4.3 server administration bot
# Example configuration file

[referee]
bot_name = "Referee"
bot_prefix = "^2RRR:^3"
database = "sqlite://referee.db"
logfile = "referee.log"
log_level = "info"

[server]
public_ip = "192.168.1.100"
port = 27960
# rcon_ip = "192.168.1.100" # Optional: defaults to public_ip
# rcon_port = 27960          # Optional: defaults to port
rcon_password = "your_rcon_password_here"
game_log = "/path/to/server/games.log"
delay = 0.33                # Seconds between log reads

# ---- Web Admin UI ----
[web]
enabled = true              # Set to true to enable the web admin dashboard
bind_address = "0.0.0.0"   # Listen address (use 127.0.0.1 to restrict to localhost)
port = 8080                 # Web UI port
# jwt_secret = "your-secret" # Optional: auto-generated if not set

# Default login: admin / changeme (change after first login!)

# ---- Auto-Update ----
[update]
enabled = false             # Set to true to enable automatic update checking
# url = "https://r3.pugbot.net/api/updates"  # Update server URL
# channel = "beta"          # Release channel: production | beta | alpha | dev
#                           #   production - unused (reserved for future)
#                           #   beta       - recommended, most stable
#                           #   alpha      - pre-release testing
#                           #   dev        - bleeding edge (automated builds land here)
# check_interval = 3600    # How often to check (seconds, default: 1 hour)
# auto_restart = true      # Automatically restart after applying an update

# ---- Map repository (external `.pk3` index for one-click imports) ----
[map_repo]
enabled = true
# List of public Apache/nginx directory-index URLs to scrape for .pk3 files.
# Visit each in a browser first to confirm it serves an HTML index.
sources = [
    "https://maps.pugbot.net/q3ut4/",
    "https://urt.li/q3ut4/",
]
refresh_interval_hours = 24   # How often the master refreshes the cache.

# Plugins to load (order matters for dependencies)

# ---- Core admin plugin (must be first) ----
[[plugins]]
name = "admin"
enabled = true
# Admin plugin settings
[plugins.settings]
warn_reason = "^7behave yourself"
max_warnings = 3
# Warn keywords: name = [duration_minutes, reason_text]
# warn_reasons = { spam = [1, "do not spam"], lang = [2, "bad language"], rage = [5, "raging"], tk = [10, "team killing"], camp = [3, "camping"], afk = [3, "AFK"] }
# Spam messages: keyword = text_to_display
# spam_messages = { rules = "^3Server rules: no cheating, no racism", website = "^7Visit us at ^2example.com" }
# rules = ["^3Rule 1: No cheating", "^3Rule 2: No racism", "^3Rule 3: Respect all players"]

# ---- Urban Terror specific admin (depends on admin) ----
[[plugins]]
name = "poweradminurt"
enabled = true
[plugins.settings]
# team_balance_enabled = true
# team_diff = 1
# rsp_enable = false           # Radio spam protection
# rsp_mute_duration = 2
